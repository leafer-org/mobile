feature: Список категорий
code: category-list
description: |
  Экран каталога — корневые и вложенные категории.
  GET /categories

specs-unit:
  Отображение корневых категорий:
    - assert: Таб "Каталог" открывает экран со списком корневых категорий
    - assert: Каждая категория отображает название и иконку
    - assert: При отсутствии категорий отображается пустое состояние

  Переход в категорию:
    - assert: По тапу на любую категорию открывается экран категории с товарами/услугами
    - assert: Если у категории есть подкатегории — они отображаются как дополнительный фильтр
    - assert: Хлебные крошки или кнопка "Назад" позволяют вернуться к родительской категории

definitions:
  feature:
    - discovery
  section:
    - mobile
