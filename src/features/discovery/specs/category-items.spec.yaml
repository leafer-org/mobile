feature: Товары/услуги в категории
code: category-items
description: |
  Список товаров/услуг внутри выбранной категории с фильтрами и пагинацией.
  GET /categories/:id/items, GET /categories/:id/filters

specs-unit:
  Список товаров:
    - assert: При переходе в любую категорию (корневую или вложенную) отображается список карточек товаров/услуг
    - assert: Карточка отображает название, цену, рейтинг, изображение
    - assert: Бесконечный скролл — при достижении конца подгружаются следующие элементы
    - assert: Пустое состояние отображается, если в категории нет товаров

  Подкатегории как фильтр:
    - assert: Если у категории есть подкатегории — они отображаются как горизонтальный список чипов
    - assert: По тапу на подкатегорию список товаров фильтруется по выбранной подкатегории
    - assert: Можно сбросить фильтр подкатегории и вернуться ко всем товарам категории

  Фильтры:
    - assert: Кнопка "Фильтры" открывает панель фильтров
      description: Набор фильтров загружается с GET /categories/:id/filters
    - assert: Фильтр по диапазону цены работает корректно
    - assert: Фильтр по рейтингу работает корректно
    - assert: Фильтры по атрибутам категории отображаются динамически
    - assert: Фильтр по расстоянию работает при наличии геолокации
    - assert: Кнопка "Сбросить" очищает все фильтры
    - assert: Применение фильтров перезагружает список с первой страницы

  Переход к деталям:
    - assert: По тапу на карточку товара открывается экран деталей
    - assert: Кнопка лайка на карточке работает (toggle like/unlike)

definitions:
  feature:
    - discovery
  section:
    - mobile
