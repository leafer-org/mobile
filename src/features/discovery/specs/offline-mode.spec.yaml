feature: Офлайн-режим
code: offline-mode
description: |
  Кэширование данных и очередь действий при отсутствии сети.

specs-unit:
  Кэширование для просмотра:
    - assert: Ранее загруженная лента доступна без сети
    - assert: Ранее просмотренные детали товаров доступны без сети
    - assert: При отсутствии сети отображается индикатор "Офлайн"

  Очередь действий:
    - assert: Лайк без сети сохраняется локально и применяется оптимистично
    - assert: При восстановлении сети накопленные действия синхронизируются
    - assert: При конфликте (товар удалён) отображается уведомление

  Восстановление соединения:
    - assert: При появлении сети данные автоматически обновляются
    - assert: Индикатор "Офлайн" скрывается

definitions:
  feature:
    - discovery
  section:
    - mobile
