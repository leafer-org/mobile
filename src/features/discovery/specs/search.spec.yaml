feature: Поиск
code: search
description: |
  Полнотекстовый поиск товаров и услуг.
  GET /search

specs-unit:
  Поисковая строка:
    - assert: На экране каталога есть поисковая строка
    - assert: При фокусе на строке отображается история последних запросов
    - assert: По тапу на элемент истории — выполняется повторный поиск
    - assert: История запросов хранится локально (до 10 элементов)

  Результаты поиска:
    - assert: При вводе текста и подтверждении — отображается список результатов
    - assert: Карточки результатов аналогичны карточкам каталога
    - assert: Бесконечный скролл подгружает следующие страницы
    - assert: Пустое состояние — "Ничего не найдено" при отсутствии результатов
    - assert: Debounce на ввод — запрос отправляется после паузы в наборе

  Фильтрация результатов:
    - assert: Фильтр по категории ограничивает результаты одной категорией
    - assert: Фильтр по диапазону цены работает корректно

definitions:
  feature:
    - discovery
  section:
    - mobile
