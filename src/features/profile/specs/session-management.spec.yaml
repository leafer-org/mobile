feature: Управление сессиями
code: session-management
description: |
  Просмотр и управление активными сессиями пользователя.
  GET /me/sessions, DELETE /me/sessions/:sessionId, DELETE /me/sessions

specs-unit:
  Список сессий:
    - assert: В настройках профиля есть пункт "Активные сессии"
    - assert: Отображается список всех активных сессий
    - assert: Текущая сессия отмечена бейджем "Текущая"
    - assert: Каждая сессия показывает дату последнего использования

  Завершение сессии:
    - assert: Свайп или кнопка "Завершить" на сессии (кроме текущей)
    - assert: Перед завершением отображается подтверждение
    - assert: После завершения сессия исчезает из списка

  Завершение всех сессий:
    - assert: Кнопка "Завершить все другие сессии"
    - assert: Перед действием отображается подтверждение
    - assert: Все сессии кроме текущей удаляются
    - assert: Текущая сессия остаётся активной

definitions:
  feature:
    - profile
  section:
    - mobile
