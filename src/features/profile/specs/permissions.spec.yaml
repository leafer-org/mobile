feature: Права доступа
code: permissions
description: |
  Адаптация UI на основе прав текущего пользователя.
  GET /me/permissions

specs-unit:
  Загрузка прав:
    - assert: При запуске приложения загружаются права пользователя
    - assert: Права кэшируются и обновляются при рефреше токена

  Адаптация UI:
    - assert: Если у пользователя нет организации — кнопка "Мои организации" ведёт на создание
    - assert: Если у пользователя есть организация — отображается кнопка перехода в кабинет
    - assert: Элементы управления организацией скрыты для сотрудников без соответствующих прав

definitions:
  feature:
    - profile
  section:
    - mobile
