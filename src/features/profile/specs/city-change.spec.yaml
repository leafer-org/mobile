feature: Смена города
code: city-change
description: |
  Смена текущего города пользователя из профиля.
  PATCH /me/profile, GET /cities

specs-unit:
  Отображение текущего города:
    - assert: В профиле отображается текущий город пользователя
    - assert: По тапу на город открывается экран выбора города

  Смена города:
    - assert: Экран выбора города аналогичен экрану из авторизации
    - assert: Поиск по названию города работает
    - assert: При наличии геолокации города сортируются по расстоянию
    - assert: По выбору нового города обновляется профиль через PATCH /me/profile

  Инвалидация данных:
    - assert: После смены города лента перезагружается с новым cityId
    - assert: Каталог перезагружается с учётом нового города
    - assert: Избранное не зависит от города и не перезагружается

definitions:
  feature:
    - profile
  section:
    - mobile
