feature: Создание отзыва
code: review-create
description: |
  Форма создания нового отзыва на товар или организацию.
  POST /reviews

specs-unit:
  Открытие формы:
    - assert: Кнопка "Оставить отзыв" на экране детали товара открывает форму
    - assert: Форма недоступна, если пользователь уже оставлял отзыв на этот товар

  Заполнение формы:
    - assert: Пользователь выбирает рейтинг от 1 до 5 звёзд
    - assert: Рейтинг обязателен — без него кнопка отправки неактивна
    - assert: Поле текста отзыва опционально
    - assert: Текст ограничен максимальной длиной

  Отправка:
    - assert: По нажатию "Отправить" отзыв создаётся через POST /reviews
    - assert: После успешной отправки пользователь возвращается к деталям товара
    - assert: Новый отзыв появляется в списке отзывов
    - assert: При ошибке сети отображается сообщение об ошибке

definitions:
  feature:
    - reviews
  section:
    - mobile
