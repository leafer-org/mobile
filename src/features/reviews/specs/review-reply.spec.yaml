feature: Ответ на отзыв
code: review-reply
description: |
  Владелец организации может ответить на отзыв о своём товаре/организации.
  POST /reviews/:id/reply

specs-unit:
  Доступность:
    - assert: Кнопка "Ответить" видна только владельцу/сотруднику организации
    - assert: Кнопка скрыта для обычных пользователей
    - assert: Кнопка скрыта, если ответ уже дан

  Отправка ответа:
    - assert: По тапу на "Ответить" открывается поле ввода текста
    - assert: Текст ответа обязателен
    - assert: После отправки ответ отображается под отзывом
    - assert: При ошибке отображается сообщение

definitions:
  feature:
    - reviews
  section:
    - mobile
