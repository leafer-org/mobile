feature: Мои отзывы
code: my-reviews
description: |
  Список отзывов текущего пользователя с возможностью редактирования и удаления.
  GET /reviews/my, PATCH /reviews/:id, DELETE /reviews/:id

specs-unit:
  Список моих отзывов:
    - assert: В профиле есть пункт "Мои отзывы"
    - assert: По тапу открывается список всех отзывов текущего пользователя
    - assert: Каждый отзыв показывает название товара/организации, рейтинг, текст, дату
    - assert: Пустое состояние — "У вас пока нет отзывов"

  Редактирование отзыва:
    - assert: По тапу на отзыв открывается форма редактирования
    - assert: Можно изменить рейтинг и текст
    - assert: После сохранения отзыв обновляется в списке

  Удаление отзыва:
    - assert: Свайп или кнопка "Удалить" на отзыве
    - assert: Перед удалением отображается подтверждение
    - assert: После удаления отзыв исчезает из списка

  Диспут:
    - assert: Если отзыв получил негативную модерацию — отображается статус
    - assert: Кнопка "Оспорить" доступна для отклонённых отзывов
    - assert: После отправки диспута статус меняется на "На рассмотрении"

definitions:
  feature:
    - reviews
  section:
    - mobile
