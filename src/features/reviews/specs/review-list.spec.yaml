feature: Просмотр отзывов
code: review-list
description: |
  Список отзывов на экране детали товара и организации.
  GET /reviews?targetType=item&targetId=..., GET /reviews/organization/:orgId

specs-unit:
  Отзывы на товар:
    - assert: На экране детали товара отображается секция "Отзывы"
    - assert: Каждый отзыв показывает рейтинг (звёзды), текст, имя автора, дату
    - assert: Отзывы отсортированы по дате (новые сверху)
    - assert: Если отзывов нет — отображается пустое состояние с предложением оставить отзыв
    - assert: Кнопка "Все отзывы" открывает полный список с пагинацией

  Отзывы на организацию:
    - assert: На экране организации отображается секция "Отзывы"
    - assert: Отзывы организации загружаются через GET /reviews/organization/:orgId

  Ответ на отзыв:
    - assert: Если у отзыва есть ответ от организации — он отображается под отзывом

definitions:
  feature:
    - reviews
  section:
    - mobile
