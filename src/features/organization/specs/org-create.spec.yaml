feature: Создание организации
code: org-create
description: |
  Создание новой организации или присоединение к существующей по токену.
  POST /organizations, POST /organizations/claim

specs-unit:
  Создание организации:
    - assert: В профиле есть кнопка "Создать организацию"
    - assert: Форма создания содержит обязательные поля — название, описание
    - assert: После успешного создания пользователь перенаправляется в кабинет организации
    - assert: Новая организация имеет статус "Черновик"

  Присоединение по токену:
    - assert: В профиле есть кнопка "Присоединиться к организации"
    - assert: Пользователь вводит токен-приглашение
    - assert: При валидном токене пользователь добавляется как сотрудник
    - assert: При невалидном токене отображается ошибка

definitions:
  feature:
    - organization
  section:
    - mobile
