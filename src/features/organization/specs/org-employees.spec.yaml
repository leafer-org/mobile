feature: Сотрудники организации
code: org-employees
description: |
  Управление сотрудниками и ролями организации.
  GET/POST/PATCH/DELETE /organizations/:id/employees, POST /organizations/:id/transfer-ownership

specs-unit:
  Список сотрудников:
    - assert: Экран организации содержит таб/секцию "Сотрудники"
    - assert: Отображается список сотрудников с именем, ролью, аватаром
    - assert: Владелец отмечен бейджем "Владелец"

  Приглашение сотрудника:
    - assert: Кнопка "Пригласить" открывает форму приглашения
    - assert: Нужно указать пользователя и роль
    - assert: После приглашения сотрудник появляется в списке

  Управление сотрудником:
    - assert: По тапу на сотрудника открывается карточка с действиями
    - assert: Можно изменить роль сотрудника
    - assert: Можно удалить сотрудника с подтверждением
    - assert: Нельзя удалить владельца

  Передача владения:
    - assert: Владелец может передать владение другому сотруднику
    - assert: Перед передачей требуется подтверждение
    - assert: После передачи бейдж "Владелец" перемещается

definitions:
  feature:
    - organization
  section:
    - mobile
