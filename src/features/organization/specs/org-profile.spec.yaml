feature: Профиль организации
code: org-profile
description: |
  Просмотр и редактирование профиля организации, отправка на модерацию.
  GET /organizations/:id, PATCH /organizations/:id, POST /organizations/:id/submit-for-moderation

specs-unit:
  Просмотр профиля:
    - assert: Экран организации отображает название, описание, статус модерации
    - assert: Если организация опубликована — отображается бейдж "Опубликовано"
    - assert: Если на модерации — отображается бейдж "На модерации"
    - assert: Если черновик — отображается бейдж "Черновик"

  Редактирование:
    - assert: Кнопка "Редактировать" открывает форму редактирования
    - assert: Изменения сохраняются как черновик через PATCH /organizations/:id
    - assert: Кнопка "Отменить изменения" сбрасывает черновик
      description: POST /organizations/:id/discard-draft-changes

  Модерация:
    - assert: Кнопка "Отправить на модерацию" доступна для черновика
    - assert: После отправки статус меняется на "На модерации"
    - assert: Кнопка "Снять с публикации" доступна для опубликованной организации

definitions:
  feature:
    - organization
  section:
    - mobile
