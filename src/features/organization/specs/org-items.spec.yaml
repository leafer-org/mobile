feature: Товары и услуги организации
code: org-items
description: |
  Управление товарами/услугами в кабинете организации.
  GET/POST/PATCH/DELETE /organizations/:orgId/items

specs-unit:
  Список товаров:
    - assert: Экран организации содержит таб/секцию "Товары и услуги"
    - assert: Отображается список карточек товаров с названием, статусом, ценой
    - assert: Пустое состояние — "Добавьте первый товар или услугу"

  Создание товара:
    - assert: Кнопка "Добавить товар" открывает форму создания
    - assert: Форма содержит поля — название, описание, цена, медиа
    - assert: Можно прикрепить фото и видео через image-picker
    - assert: После создания товар появляется в списке со статусом "Черновик"

  Редактирование черновика:
    - assert: По тапу на товар со статусом "Черновик" открывается форма редактирования
    - assert: Изменения сохраняются через PATCH /organizations/:orgId/items/:itemId
    - assert: Кнопка "Удалить черновик" удаляет товар с подтверждением

  Модерация товара:
    - assert: Кнопка "На модерацию" отправляет товар на проверку
    - assert: После отправки статус меняется на "На модерации"
    - assert: Для опубликованного товара доступна кнопка "Снять с публикации"

definitions:
  feature:
    - organization
  section:
    - mobile
