feature: Роли организации
code: org-roles
description: |
  Управление ролями сотрудников организации.
  GET/POST/PATCH/DELETE /organizations/:id/roles

specs-unit:
  Список ролей:
    - assert: В настройках организации есть секция "Роли"
    - assert: Отображается список ролей с названиями
    - assert: Роль по умолчанию отмечена соответствующим бейджем

  Создание роли:
    - assert: Кнопка "Создать роль" открывает форму
    - assert: Нужно указать название и набор прав
    - assert: После создания роль появляется в списке

  Редактирование роли:
    - assert: По тапу на роль открывается форма редактирования
    - assert: Можно изменить название и права
    - assert: Изменения применяются ко всем сотрудникам с этой ролью

  Удаление роли:
    - assert: Кнопка "Удалить" доступна для ролей без сотрудников или с указанием замены
    - assert: Перед удалением требуется подтверждение

definitions:
  feature:
    - organization
  section:
    - mobile
